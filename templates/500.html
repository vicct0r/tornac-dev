{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    body { padding-top: 0 !important; }
    .error-page { min-height: 100vh; display: flex; align-items: center; }
    .error-code {
        font-size: 6rem;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, var(--danger) 0%, #fb923c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
    }
    .error-icon {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--danger);
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
    }
    .btn-outline-retry {
        color: var(--warning);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: var(--radius);
        transition: var(--transition);
    }
    .btn-outline-retry:hover {
        background: rgba(251, 191, 36, 0.1);
        color: var(--warning);
        border-color: var(--warning);
    }
</style>
{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="error-icon">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
                <div class="error-code mb-3">500</div>
                <h2 class="h4 mb-3" style="color: var(--text-primary);">Erro interno do servidor</h2>
                <p class="mb-5" style="color: var(--text-secondary);">
                    Algo deu errado. Provavelmente ja estou trabalhando para resolver.
                </p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{% url 'pages:home' %}" class="btn btn-accent btn-lg">
                        <i class="bi bi-house me-2"></i>Inicio
                    </a>
                    <button onclick="window.location.reload()" class="btn btn-outline-retry btn-lg">
                        <i class="bi bi-arrow-clockwise me-2"></i>Tentar Novamente
                    </button>
                </div>
                <div class="mt-5">
                    <p class="small" style="color: var(--text-muted);">
                        Demorei corrigir?
                        <a href="mailto:v1ctor_inacio@proton.me" style="color: var(--accent); text-decoration: none;">Envie um e-mail</a>.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
