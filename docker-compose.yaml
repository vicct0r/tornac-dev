services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  web:
    build: .
    container_name: tornac-dev-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine    # mesma versão do proxy
    container_name: tornac-dev-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/vol/static:ro     # ro: somente leitura
      - media:/vol/media:ro
    depends_on:
      - web
    networks:
      - internal
      - nginx-proxy-net

networks:
  internal:
  nginx-proxy-net:
    external: true

volumes:
  postgres_data:
  static:
  media: